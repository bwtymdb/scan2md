name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Package and create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          zip -r "scan2md-${tag}.zip" main.js manifest.json styles.css
          gh release create "$tag" main.js manifest.json styles.css "scan2md-${tag}.zip" \
            --title "scan2md ${tag}" --generate-notes
